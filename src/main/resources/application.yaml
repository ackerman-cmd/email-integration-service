spring:
    application:
        name: email-integration-service
    servlet:
        multipart:
            max-file-size: 10MB
            max-request-size: 25MB

    config:
        import: "optional:file:./secrets.yaml"

    datasource:
        url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
        username: ${POSTGRES_USER}
        password: ${POSTGRES_PASSWORD}
        driver-class-name: org.postgresql.Driver

    jpa:
        hibernate:
            ddl-auto: none
        properties:
            hibernate:
                default_schema: email_service
        open-in-view: false

    liquibase:
        change-log: classpath:db/changelog/db.changelog-master.yaml
        default-schema: email_service
        liquibase-schema: email_service

    kafka:
        bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
        producer:
            key-serializer: org.apache.kafka.common.serialization.StringSerializer
            value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
            properties:
                spring.json.add.type.headers: false
        consumer:
            group-id: email-integration-service
            auto-offset-reset: earliest
            key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
            value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
            properties:
                spring.json.trusted.packages: "com.base.emailintegrationservice.kafka.event"

    jackson:
        default-property-inclusion: non_null

resend:
    api:
        key: ${RESEND_API_KEY}
    base-url: https://api.resend.com
    webhook-secret: ${RESEND_WEBHOOK_SECRET:}

app:
    s3:
        endpoint: ${S3_ENDPOINT:http://localhost:9100}
        access-key: ${S3_ACCESS_KEY:minioadmin}
        secret-key: ${S3_SECRET_KEY:minioadmin}
        bucket: ${S3_BUCKET:email-attachments}
        region: ${S3_REGION:us-east-1}
        public-url: ${S3_PUBLIC_URL:}

mail:
    from: ${MAIL_FROM}

server:
    port: ${SERVER_PORT:8084}

management:
    endpoints:
        web:
            exposure:
                include: health,info,metrics,liquibase
    endpoint:
        health:
            show-details: always
            probes:
                enabled: true
    health:
        livenessState:
            enabled: true
        readinessState:
            enabled: true

springdoc:
    api-docs:
        path: /api-docs
    swagger-ui:
        path: /swagger-ui.html
        tags-sorter: alpha
        operations-sorter: alpha

logging:
    level:
        liquibase: INFO
